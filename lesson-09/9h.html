<!DOCTYPE html>
<html>
  <head>
    <title> Lesson 09 H</title>
    <link rel="stylesheet" href="styles/9h.css">
  </head>

      <img class="google-logo" src="Google-logo.png">
    </div>
    <div>

    </div>
    <div>
      <button class="google-link"> Google Search </button>
      <button class="lucky-link"> I'm Feeling Lucky </button>
    </div>
  </body>
</html>
